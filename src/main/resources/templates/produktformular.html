<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
	<body>
		<div th:replace="~{fragments/layout :: navigation}"></div>
		<div class="container mt-4">
			<h1 class="mb-4">Produkt anlegen</h1>
			<form th:action="${produkt.id} != null ? @{/admin/produkte/{id}/bearbeiten(id=${produkt.id})} : @{/admin/produkte/neu}" method="post" th:object="${produkt}">
				<input type="hidden" th:field="*{id}"/>
				<div class="mb-3">
					<label class="form-label">Hersteller: </label>
					<input type="text" th:field="*{hersteller}" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">Modell: </label>
					<input type="text" th:field="*{modell}" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">Zustand: </label>
					<input type="text" th:field="*{zustand}" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">Preis: </label>
					<input type="text" th:field="*{preis}" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">Beschreibung: </label>
					<input type="text" th:field="*{beschreibung}" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">Lagerbestand: </label>
					<input type="text" th:field="*{lagerbestand}" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">Bildpfad: </label>
					<input type="text" th:field="*{bildpfad}" class="form-control" />
				</div>
				<div class="mb-3">
					<label class="form-label">Kategorie: </label>
					<select th:field="*{kategorie}" class="form-select">
						<option value="">bitte wählen</option>
						<option th:each="kat : ${kategorien}" th:value="${kat.id}" th:text="${kat.name}"></option>
					</select>
				</div>
				<button type="submit" class="btn btn-primary">Speichern</button>
			</form>
		</div>
	</body>
</html>
