<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	<head>
		<title>Produktübersicht</title>
	</head>
	<body>
		<h1>Unsere Produkte</h1>
		<table>
			<tr>
				<th>Hersteller</th>
				<th>Modell</th>
				<th>Zustand</th>
				<th>Preis</th>
			</tr>
			<tr th:each="produkt : ${produkte}">
				<td th:text="${produkt.hersteller}"></td>
				<td th:text="${produkt.modell}"></td>
				<td th:text="${produkt.zustand}"></td>
				<td th:text="${produkt.preis}"></td>
				<td><a th:href="@{/produkte/{id}(id=${produkt.id})}">Mehr Details</a></td>
				<td sec:authorize="hasRole('ADMIN')">
					<form th:action="@{/admin/produkte/{id}/loeschen(id=${produkt.id})}" method="post">
						<button type="submit">Löschen</button>
					</form>
				</td>
				<td sec:authorize="hasRole('ADMIN')">
					<a th:href="@{/admin/produkte/{id}/bearbeiten(id=${produkt.id})}" class="btn">Bearbeiten</a>
				</td>
				<td>
					<form th:action="@{/warenkorb/hinzufuegen/{id}(id=${produkt.id})}" method="post">
						<button type="submit">In den Warenkorb</button>
					</form>
				</td>
			</tr>
		</table>
		<a th:href="@{/warenkorb/liste}">Zum Warenkorb</a>
		<a th:href="@{/}">Zurück zu Startseite</a>
	</body>
</html>
