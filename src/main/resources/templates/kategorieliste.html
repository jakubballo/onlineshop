<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	<head>
		<title>
			Kategorie Liste
		</title>
	</head>
	<body>
		<h1>Unsere Kategorien</h1>
		<table>
			<tr>
				<th>Name</th>
				<th>Beschreibung</th>
			</tr>
			<tr th:each="kategorie : ${kategorien}">
				<td th:text="${kategorie.name}"></td>
				<td th:text="${kategorie.beschreibung}"></td>
				<td sec:authorize="hasRole('ADMIN')">
					<form th:action="@{/admin/kategorien/{id}/loeschen(id=${kategorie.id})}" method="post">
						<button type="submit">Löschen</button>
					</form>
				</td>
				<td sec:authorize="hasRole('ADMIN')">
					<a th:href="@{/admin/kategorien/{id}/bearbeiten(id=${kategorie.id})}" class="btn">Bearbeiten</a>
				</td>
			</tr>
		</table>
		<a th:href="@{/}">Zurück zu Startseite</a>
	</body>
</html>
