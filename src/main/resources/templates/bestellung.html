<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	<head th:replace="~{fragments/layout :: head}"></head>
	<body>
		<div th:replace="~{fragments/layout :: navigation}"></div>
		<div class="container mt-4">
			<h1 class="mb-4">Deine Bestellung wurde erfolgreich abgeschickt!</h1>

			<div class="card mb-4">
				<div class="card-body">
					<p class="mb-1"><strong>Bestelldatum: </strong><span th:text="${bestellung.bestelldatum}"></span></p>
					<p class="mb-1"><strong>Gesamtsumme: </strong><span th:text="${bestellung.gesamtsumme}"></span> €</p>
					<p class="mb-0"><strong>Zahlungsart: </strong><span th:text="${bestellung.zahlungsart}"></span></p>
				</div>
			</div>

			<table class="table table-striped table-hover">
				<tr>
					<th>Hersteller</th>
					<th>Menge</th>
					<th>Einzelpreis</th>
				</tr>
				<tr th:each="position : ${positionen}">
					<td th:text="${position.produkt.hersteller}"></td>
					<td th:text="${position.menge}"></td>
					<td th:text="${position.einzelpreis}"></td>
				</tr>
			</table>

			<a th:href="@{/}" class="btn btn-primary mt-3">Zurück zur Startseite</a>
		</div>
	</body>
</html>
