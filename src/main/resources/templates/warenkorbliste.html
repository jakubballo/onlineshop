<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}"></head>
	<body>
		<div th:replace="~{fragments/layout :: navigation}"></div>
		<div class="container mt-4">
			<h1 class="mb-4">Mein Warenkorb</h1>
			<table class="table table-striped table-hover">
				<tr>
					<th>Produkt</th>
					<th>Menge</th>
					<th>Preis</th>
				</tr>
				<tr th:each="eintrag : ${warenkorbeinträge}">
					<td th:text="${eintrag.produkt.hersteller}"></td>
					<td th:text="${eintrag.menge}"></td>
					<td th:text="${eintrag.produkt.preis}"></td>
					<td>
						<form th:action="@{/warenkorb/entfernen/{id}(id=${eintrag.produkt.id})}" method="post">
							<button type="submit" class="btn btn-danger btn-sm">Entfernen</button>
						</form>
					</td>
				</tr>
			</table>

			<div class="card">
				<div class="card-body">
					<h2 class="card-title h5">Gesamtsumme: <span th:text="${gesamtsumme}"></span> €</h2>

					<form th:action="@{/checkout}" method="post" class="mt-3">
						<div class="mb-3">
							<label class="form-label d-block">Zahlungsart:</label>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="zahlungsart" value="VISA" id="visa" />
								<label class="form-check-label" for="visa">Visa</label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="zahlungsart" value="PAYPAL" id="paypal" />
								<label class="form-check-label" for="paypal">PayPal</label>
							</div>
							<div class="form-check form-check-inline">
								<input class="form-check-input" type="radio" name="zahlungsart" value="UEBERWEISUNG" id="ueberweisung" />
								<label class="form-check-label" for="ueberweisung">Überweisung</label>
							</div>
						</div>
						<button type="submit" class="btn btn-success">Jetzt bestellen</button>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
